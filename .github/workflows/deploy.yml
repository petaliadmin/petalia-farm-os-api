name: Deploy to EC2

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.deploy.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.deploy.yml,.env.production"
          target: "/home/${{ secrets.EC2_USER }}/petalia-farm-os"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,DOCKERHUB_USERNAME
          script: |
            cd /home/${{ secrets.EC2_USER }}/petalia-farm-os

            # DockerHub login
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Set image tag (use commit SHA or fallback to latest)
            export IMAGE_TAG=${IMAGE_TAG:-latest}
            export DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME

            # Pull new image
            docker compose -f docker-compose.deploy.yml pull

            # Restart containers with new image
            docker compose -f docker-compose.deploy.yml down
            docker compose -f docker-compose.deploy.yml up -d

            # Clean up old images
            docker image prune -f

            # DockerHub logout
            docker logout

            echo "Deployment complete — $IMAGE_TAG"
