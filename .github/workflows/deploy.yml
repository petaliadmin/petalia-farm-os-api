name: Deploy to EC2

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    environment:
      name: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify staging secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Secrets not found in environment: staging"
            exit 1
          fi
          echo "Staging secrets OK"

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.deploy.yml,.env.production"
          target: "/home/${{ secrets.EC2_USER }}/petalia-farm-os"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN

          script: |
            set -e
            mkdir -p ~/petalia-farm-os
            cd ~/petalia-farm-os

            echo "$DOCKERHUB_TOKEN" | docker login \
              -u "$DOCKERHUB_USERNAME" \
              --password-stdin

            # docker compose substitutes ${VARS} at YAML parse time, BEFORE
            # env_file is read. Export them explicitly so the image reference
            # `${DOCKERHUB_USERNAME}/petalia-farm-os-api:${IMAGE_TAG}` resolves.
            export DOCKERHUB_USERNAME
            export IMAGE_TAG="${IMAGE_TAG:-latest}"

            docker compose --env-file .env.production -f docker-compose.deploy.yml pull
            docker compose --env-file .env.production -f docker-compose.deploy.yml up -d --remove-orphans

            # Prune dangling images only (keeps tagged images of other apps on the host)
            docker image prune -f
            docker logout