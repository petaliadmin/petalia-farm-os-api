name: Deploy to EC2

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify secrets
        run: |
          [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] || exit 1
          [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ] || exit 1
          [ -n "${{ secrets.EC2_HOST }}" ] || exit 1
          [ -n "${{ secrets.EC2_USER }}" ] || exit 1
          [ -n "${{ secrets.EC2_SSH_KEY }}" ] || exit 1
          echo "Secrets OK"

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/petalia-farm-os

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.deploy.yml,.env.production"
          target: "/home/${{ secrets.EC2_USER }}/petalia-farm-os"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN

          script: |
            cd ~/petalia-farm-os

            export IMAGE_TAG=${IMAGE_TAG:-latest}

            echo "$DOCKERHUB_TOKEN" | docker login \
              -u "$DOCKERHUB_USERNAME" \
              --password-stdin

            docker compose -f docker-compose.deploy.yml pull

            docker compose -f docker-compose.deploy.yml up -d --remove-orphans

            docker image prune -af

            docker logout

            echo "Deployment successful"