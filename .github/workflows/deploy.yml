name: Deploy Petalia API

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.deploy.yml + init script to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.deploy.yml,scripts/init-db.sql"
          target: "petalia-farm-os"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: sha-${{ github.event.workflow_run.head_sha }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,DOCKERHUB_USERNAME
          script: |
            cd petalia-farm-os
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            export IMAGE_TAG=${IMAGE_TAG:-latest}
            export DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
            docker compose --env-file .env.production -f docker-compose.deploy.yml pull
            docker compose --env-file .env.production -f docker-compose.deploy.yml run --rm --no-deps -e NODE_ENV=production api npm run migration:run
            docker compose --env-file .env.production -f docker-compose.deploy.yml down
            docker compose --env-file .env.production -f docker-compose.deploy.yml up -d
            docker image prune -f
            docker logout
