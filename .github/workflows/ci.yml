name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  IMAGE_NAME: petalia-farm-os-api

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── Job 1: Lint & Test ───────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: petalia_test
          POSTGRES_PASSWORD: test_secret
          POSTGRES_DB: petalia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U petalia_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript build (sanity check)
        run: npm run build

      - name: Unit tests
        run: npm test -- --passWithNoTests --forceExit
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: petalia_test
          DB_PASSWORD: test_secret
          DB_NAME: petalia_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: ci_jwt_secret_placeholder
          REFRESH_TOKEN_SECRET: ci_refresh_secret_placeholder
          JWT_EXPIRES_IN: 8h
          REFRESH_TOKEN_EXPIRES_IN: 30d
          PORT: 3000

  # ─── Job 2: Build & Push Docker Image (main only) ─────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 30

    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify DockerHub secrets are configured
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::DOCKERHUB_USERNAME or DOCKERHUB_TOKEN secret is missing in environment 'staging'."
            echo "Add them at Settings → Environments → staging → Add secret."
            echo "DOCKERHUB_TOKEN must be a Personal Access Token (https://hub.docker.com/settings/security), NOT your account password."
            exit 1
          fi
          echo "Secrets present (username: $DOCKERHUB_USERNAME)"

      - name: Set up QEMU (multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=Petalia Farm OS API
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # linux/amd64 only for now — most EC2 fleets are x86_64.
          # Add linux/arm64 when you move to Graviton.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache,mode=max,ignore-error=true
          provenance: false

  # ─── Job 3: Deploy to EC2 (main only, after successful build) ─────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 20

    environment:
      name: staging
      url: http://${{ secrets.EC2_HOST }}/api/health

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: echo "value=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Verify required secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          missing=()
          [ -z "$DOCKERHUB_USERNAME" ] && missing+=("DOCKERHUB_USERNAME")
          [ -z "$DOCKERHUB_TOKEN" ]    && missing+=("DOCKERHUB_TOKEN")
          [ -z "$EC2_HOST" ]           && missing+=("EC2_HOST")
          [ -z "$EC2_USER" ]           && missing+=("EC2_USER")
          [ -z "$EC2_SSH_KEY" ]        && missing+=("EC2_SSH_KEY")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing secrets in environment 'staging': ${missing[*]}"
            exit 1
          fi
          echo "All deployment secrets present."

      - name: SSH connectivity check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30s
          script: |
            set -e
            echo "── EC2 connectivity OK ──"
            echo "host: $(hostname)"
            echo "user: $(whoami)"
            echo "pwd : $(pwd)"
            echo "docker: $(docker --version 2>/dev/null || echo 'MISSING — install Docker on the EC2')"
            echo "compose: $(docker compose version 2>/dev/null || echo 'MISSING — install Docker Compose plugin')"
            echo "disk free: $(df -h / | awk 'NR==2 {print $4}')"
            mkdir -p "$HOME/petalia-farm-os"
            echo "app dir: $HOME/petalia-farm-os ✅"

      - name: Copy compose + init scripts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.deploy.yml,scripts/init-db.sql"
          target: "/home/${{ secrets.EC2_USER }}/petalia-farm-os"
          overwrite: true

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.value }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m
          envs: IMAGE_TAG,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,GIT_SHA
          script: |
            set -euo pipefail

            APP_DIR="$HOME/petalia-farm-os"
            COMPOSE="docker compose --env-file $APP_DIR/.env.production -f $APP_DIR/docker-compose.deploy.yml"

            cd "$APP_DIR"

            # ── Preflight ─────────────────────────────────────────────────────
            if [ ! -f .env.production ]; then
              echo "::error::Missing $APP_DIR/.env.production on the EC2 host."
              echo "Create it once manually with DB/Redis/JWT/MinIO/Dockerhub secrets."
              exit 1
            fi

            for var in POSTGRES_PASSWORD JWT_SECRET MINIO_ROOT_PASSWORD; do
              if ! grep -q "^${var}=" .env.production; then
                echo "::error::.env.production is missing required variable: $var"
                exit 1
              fi
            done

            export DOCKERHUB_USERNAME
            export IMAGE_TAG="${IMAGE_TAG:-latest}"
            echo "Deploying tag: $IMAGE_TAG"

            # ── DockerHub login ───────────────────────────────────────────────
            echo "$DOCKERHUB_TOKEN" | docker login \
              -u "$DOCKERHUB_USERNAME" \
              --password-stdin

            # ── Capture current state for rollback ───────────────────────────
            PREV_TAG=$(docker inspect --format='{{ index .Config.Labels "deploy.tag" }}' \
              petalia-api 2>/dev/null || echo "")
            echo "Previous deployed tag: ${PREV_TAG:-none}"

            # ── Pull new images ───────────────────────────────────────────────
            $COMPOSE pull api worker

            # ── Run TypeORM migrations BEFORE swapping containers ────────────
            echo "Running migrations..."
            if ! $COMPOSE run --rm --no-deps -e NODE_ENV=production api npm run migration:run; then
              echo "::error::Migration failed — aborting deploy. Current containers untouched."
              docker logout
              exit 1
            fi

            # ── Roll out ──────────────────────────────────────────────────────
            $COMPOSE up -d --remove-orphans

            # ── Health check (90s deadline, accounts for cold start) ─────────
            echo "Waiting for /api/health to return 200..."
            ok=0
            for i in $(seq 1 45); do
              status=$(curl -fsS -o /dev/null -w "%{http_code}" http://localhost:3000/api/health || echo "000")
              if [ "$status" = "200" ]; then
                echo "Health OK after ${i}x2s"
                ok=1
                break
              fi
              sleep 2
            done

            if [ "$ok" -ne 1 ]; then
              echo "::error::Health check failed for tag $IMAGE_TAG"
              echo "── api logs (last 80 lines) ──"
              docker logs --tail 80 petalia-api 2>&1 || true
              echo "── worker logs (last 40 lines) ──"
              docker logs --tail 40 petalia-worker 2>&1 || true

              if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$IMAGE_TAG" ]; then
                echo "Rolling back to previous tag: $PREV_TAG"
                export IMAGE_TAG="$PREV_TAG"
                $COMPOSE up -d --remove-orphans api worker || true
              fi

              docker logout
              exit 1
            fi

            # ── Cleanup ──────────────────────────────────────────────────────
            docker image prune -f
            docker logout

            echo "✅ Deployed $IMAGE_TAG (commit $GIT_SHA)"

      - name: Notify Slack on failure
        if: failure()
        run: |
          if [ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping notification."
            exit 0
          fi
          curl -fsS -X POST -H 'Content-Type: application/json' \
            --data "$(cat <<EOF
          {
            "text": ":rotating_light: Petalia deploy FAILED (tag \`${{ steps.tag.outputs.value }}\`, commit \`${{ github.sha }}\`)",
            "attachments": [{
              "color": "#d10000",
              "fields": [
                {"title": "Workflow", "value": "${{ github.workflow }}", "short": true},
                {"title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view logs>", "short": true}
              ]
            }]
          }
          EOF
          )" "${{ secrets.SLACK_WEBHOOK_URL }}"
