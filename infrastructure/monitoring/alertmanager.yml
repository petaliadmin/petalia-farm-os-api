global:
  resolve_timeout: 5m
  slack_api_url_file: /etc/alertmanager/secrets/slack_webhook_url

route:
  receiver: slack-default
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = "critical"
      receiver: slack-critical
      group_wait: 10s
      repeat_interval: 30m
      continue: true

    - matchers:
        - service = "billing"
      receiver: slack-billing
      repeat_interval: 1h

inhibit_rules:
  # If the API is down, suppress noisier downstream alerts (latency, queue backlog)
  - source_matchers:
      - alertname = "PetaliaApiDown"
    target_matchers:
      - severity =~ "warning|error"
    equal: ["service"]

receivers:
  - name: slack-default
    slack_configs:
      - channel: "#petalia-alerts"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'

  - name: slack-critical
    slack_configs:
      - channel: "#petalia-incidents"
        send_resolved: true
        title: ':rotating_light: {{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'

  - name: slack-billing
    slack_configs:
      - channel: "#petalia-billing"
        send_resolved: true

templates:
  - /etc/alertmanager/templates/*.tmpl
